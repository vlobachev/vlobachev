<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 268" width="880" height="268" role="img" aria-label="Vitaly Lobachev — Platform / DevOps Engineer, Amsterdam. Live monitoring dashboard header.">
  <title>Vitaly Lobachev — Platform / DevOps Engineer</title>
  <defs>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3fb950" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="panel"><rect x="20" y="208" width="840" height="44" rx="6"/></clipPath>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .name { font-size: 40px; font-weight: 700; letter-spacing: -0.5px; fill: #e6edf3; }
      .role { font-size: 16px; font-weight: 500; letter-spacing: 0.5px; fill: #8b949e; }
      .prompt { font-size: 14px; fill: #6e7681; }
      .accent { fill: #3fb950; }
      .chip { font-size: 12.5px; fill: #8b949e; letter-spacing: 0.3px; }
      .chiphi { fill: #c9d1d9; }
      .title { font-size: 12.5px; fill: #6e7681; letter-spacing: 0.4px; }
      .metric { font-size: 11px; fill: #6e7681; letter-spacing: 0.5px; }
      .metricval { fill: #3fb950; font-weight: 600; }

      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }

      .draw { stroke-dasharray: 1500; stroke-dashoffset: 1500; animation: draw 2.4s ease-out forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }

      .sweep { animation: sweep 7s linear infinite; }
      @keyframes sweep { 0% { transform: translateX(-60px); } 100% { transform: translateX(900px); } }

      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2s ease-out infinite; }
      @keyframes pulse { 0% { transform: scale(1); opacity: 0.7; } 70%,100% { transform: scale(3.4); opacity: 0; } }

      @media (prefers-reduced-motion: reduce) {
        .cursor { animation: none; opacity: 1; }
        .draw { animation: none; stroke-dashoffset: 0; }
        .sweep { animation: none; opacity: 0; }
        .pulse { animation: none; opacity: 0; }
      }
    </style>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="878" height="266" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- title bar -->
  <line x1="20" y1="46" x2="860" y2="46" stroke="#21262d" stroke-width="1"/>
  <circle cx="34" cy="24" r="6" fill="#f85149"/>
  <circle cx="54" cy="24" r="6" fill="#d29922"/>
  <circle cx="74" cy="24" r="6" fill="#3fb950"/>
  <text x="440" y="28" text-anchor="middle" class="mono title">vitaly@amsterdam: ~/platform-engineering</text>

  <!-- prompt + identity -->
  <text x="32" y="82" class="mono prompt"><tspan class="accent">$</tspan> whoami</text>
  <rect class="cursor" x="105" y="70" width="8" height="15" fill="#3fb950" opacity="0.85"/>
  <text x="30" y="128" class="mono name">Vitaly Lobachev</text>
  <text x="32" y="156" class="mono role"><tspan class="accent">›</tspan> Platform Engineer · AI Infrastructure &#160;&#160;·&#160;&#160; Amsterdam, NL &#160;&#160;·&#160;&#160; 15+ yrs</text>

  <!-- skill chips -->
  <text x="32" y="188" class="mono chip">
    <tspan class="accent">◆</tspan> <tspan class="chiphi">AWS</tspan> &#160;&#160;<tspan class="accent">◆</tspan> <tspan class="chiphi">Kubernetes</tspan> &#160;&#160;<tspan class="accent">◆</tspan> <tspan class="chiphi">Terraform</tspan> &#160;&#160;<tspan class="accent">◆</tspan> <tspan class="chiphi">GitOps</tspan> &#160;&#160;<tspan class="accent">◆</tspan> <tspan class="chiphi">Observability</tspan> &#160;&#160;<tspan class="accent">◆</tspan> <tspan class="chiphi">LLMOps · AI Agents</tspan>
  </text>

  <!-- monitoring panel -->
  <rect x="20" y="208" width="840" height="44" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <g clip-path="url(#panel)">
    <!-- area fill -->
    <path d="M24,245 L80,238 L120,247 L170,226 L210,240 L260,229 L300,246 L350,221 L400,238 L450,232 L500,244 L560,225 L610,241 L660,227 L720,239 L780,223 L840,236 L856,239 L856,252 L24,252 Z" fill="url(#area)"/>
    <!-- line -->
    <path class="draw" d="M24,245 L80,238 L120,247 L170,226 L210,240 L260,229 L300,246 L350,221 L400,238 L450,232 L500,244 L560,225 L610,241 L660,227 L720,239 L780,223 L840,236 L856,239"
          fill="none" stroke="#3fb950" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- sweep scanline -->
    <rect class="sweep" x="0" y="208" width="46" height="44" fill="url(#scan)" opacity="0.5"/>
    <!-- live pulse at latest sample -->
    <circle class="pulse" cx="856" cy="239" r="3.2" fill="#3fb950"/>
    <circle cx="856" cy="239" r="3.2" fill="#3fb950"/>
  </g>
  <!-- panel labels -->
  <text x="34" y="223" class="mono metric">UPTIME <tspan class="metricval">99.9%</tspan></text>
  <text x="746" y="223" text-anchor="end" class="mono metric">MTTD <tspan class="metricval">-80%</tspan></text>
</svg>
